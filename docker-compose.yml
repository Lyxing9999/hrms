services:
  frontend:
    container_name: nuxt-frontend-lite-DDD-clean
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CI: "true"
      NO_COLOR: "1"
    env_file:
      - ./frontend/.env
    tty: true
    stdin_open: true
    command: sh -lc "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 3000"

  backend:
    container_name: flask-backend-lite-DDD-clean
    build: ./backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - ./backend/app/uploads/files:/app/app/uploads/files
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_RUN_HOST: 0.0.0.0
    command: ["python", "run.py"]

volumes:
  node_modules: