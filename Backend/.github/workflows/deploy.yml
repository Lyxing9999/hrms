name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }} # ដាក់ IP របស់ EC2
          username: ${{ secrets.EC2_USERNAME }} # ជាទូទៅគឺ ubuntu
          key: ${{ secrets.EC2_SSH_KEY }} # Private Key (.pem) របស់អ្នក
          script: |
            # ចូលទៅកាន់ Folder គម្រោងរបស់អ្នកលើ EC2
            cd /home/ubuntu/school-management-system/backend

            # ទាញកូដថ្មីពី GitHub
            git pull origin main

            # បញ្ឈប់ និង Build Docker Container ឡើងវិញ
            docker-compose down
            docker-compose up -d --build
